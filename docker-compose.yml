# ─────────────────────────────────────────────────────────────
# docker-compose.yml
# Local development environment.
# Starts Node backend + MongoDB (local Atlas alternative for dev).
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riserank-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/riserank
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - riserank-network

  mongo:
    image: mongo:7
    container_name: riserank-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - riserank-network

volumes:
  mongo_data:

networks:
  riserank-network:
    driver: bridge
