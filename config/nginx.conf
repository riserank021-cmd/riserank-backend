# nginx.conf — RiseRank server
user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream riserank_backend {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # ── api.riserank.in ──────────────────────────────────────
    server {
        listen 80;
        server_name api.riserank.in;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.riserank.in;

        ssl_certificate     /etc/letsencrypt/live/api.riserank.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.riserank.in/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        client_max_body_size 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /api/v1/health {
            proxy_pass http://riserank_backend;
            access_log off;
        }

        location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password|google) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://riserank_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://riserank_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        location ~ /\. { deny all; }
    }

    # ── riserank.in (main website + admin) ───────────────────
    server {
        listen 80;
        server_name riserank.in www.riserank.in;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name riserank.in www.riserank.in;

        ssl_certificate     /etc/letsencrypt/live/riserank.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/riserank.in/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        root /var/www/riserank;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /api/ {
            proxy_pass http://localhost:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin {
            alias /var/www/riserank-admin/dist;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }
    }
}
