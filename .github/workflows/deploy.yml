# ─────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Triggers: push to main, or manual dispatch
# Flow: test → write .env on server → pull code → restart PM2
# ─────────────────────────────────────────────────────────────

name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Syntax check
        run: node --check server.js

  # ── Job 2: Deploy ───────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Write .env and deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  180s
          envs: |
            MONGO_URI,JWT_SECRET,JWT_EXPIRES_IN,JWT_REFRESH_SECRET,JWT_REFRESH_EXPIRES_IN,
            SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,
            AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,AWS_S3_BUCKET,
            FIREBASE_SERVER_KEY,GOOGLE_CLIENT_ID,
            SUPER_ADMIN_EMAIL,SUPER_ADMIN_PASSWORD,
            ALLOWED_ORIGINS,BCRYPT_SALT_ROUNDS,LOG_LEVEL
          # Pass all secrets as environment variables to the remote script
          script_stop: true
          script: |
            set -e

            APP_DIR=/var/www/riserank-backend

            echo "=== [1/4] Pulling latest code ==="
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/4] Writing .env ==="
            cat > $APP_DIR/.env << ENV_EOF
            NODE_ENV=production
            PORT=5000

            MONGO_URI=${{ secrets.MONGO_URI }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_REFRESH_EXPIRES_IN=30d

            BCRYPT_SALT_ROUNDS=12

            ALLOWED_ORIGINS=https://riserank.in,https://www.riserank.in

            SMTP_HOST=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}

            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=ap-south-1
            AWS_S3_BUCKET=riserank-assets
            AWS_S3_BASE_URL=https://riserank-assets.s3.ap-south-1.amazonaws.com

            FIREBASE_SERVER_KEY=${{ secrets.FIREBASE_SERVER_KEY }}

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

            SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
            SUPER_ADMIN_PASSWORD=${{ secrets.SUPER_ADMIN_PASSWORD }}

            LOG_LEVEL=info
            LOG_DIR=logs

            RATE_LIMIT_WINDOW_MS=900000
            RATE_LIMIT_MAX=100
            AUTH_RATE_LIMIT_MAX=10
            ENV_EOF

            chmod 600 $APP_DIR/.env

            echo "=== [3/4] Installing production dependencies ==="
            npm ci --only=production

            echo "=== [4/4] Reloading PM2 ==="
            pm2 reload ecosystem.config.js --env production --update-env || \
              pm2 start ecosystem.config.js --env production
            pm2 save

            echo "=== Deployment complete ==="
            pm2 status riserank-backend
